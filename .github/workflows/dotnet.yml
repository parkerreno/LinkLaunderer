# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Install MAUI workloads
      run: dotnet workload install maui-android maui-tizen maui-ios
    - name: Restore workloads
      run: dotnet workload restore
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore --verbosity normal
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: |
          ./**/bin/**
          ./**/obj/**
        retention-days: 1

  test:
    name: Test
    runs-on: windows-latest
    needs: build
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-output
    - name: Run tests
      run: dotnet test --no-build --verbosity normal
    - name: Build Android APK
      run: dotnet publish src/LinkLaunderer.App/LinkLaunderer.App.csproj -f net10.0-android -c Release
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: src/LinkLaunderer.App/bin/Release/net10.0-android/**/*.apk
